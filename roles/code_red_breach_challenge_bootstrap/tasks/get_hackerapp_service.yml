- name: Get hacker-app service
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: hacker-app
    namespace: "{{ sandbox_openshift_namespace }}"
    host: "{{ sandbox_openshift_api_url }}"
    api_key: "{{ sandbox_openshift_api_key }}"
    validate_certs: false
  register: r_hacker_app_service

- name: Extract LoadBalancer IP
  ansible.builtin.set_fact:
    lb_ip: "{{ r_hacker_app_service.resources[0].status.loadBalancer.ingress[0].ip }}"
  when:
  - r_hacker_app_service.resources | length > 0
  - r_hacker_app_service.resources[0].status.loadBalancer.ingress is defined
  - r_hacker_app_service.resources[0].status.loadBalancer.ingress | length > 0
